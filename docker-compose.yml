version: '3.8'

services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  web:
    # VULNERABILIDAD INTENCIONADA 4: Sin límites de memoria ni CPU
    # VULNERABILIDAD INTENCIONADA 5: Sin healthcheck
    build: ./app
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis

  nginx:
    # VULNERABILIDAD INTENCIONADA 6: Puerto no bindeado a interfaz específica
    build: ./nginx
    ports:
      - "8080:80"
    depends_on:
      - web

volumes:
  redis_data:
