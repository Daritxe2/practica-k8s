version: '3.8'

services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  web:
    # VULNERABILIDAD CORREGIDA (MEDIUM): Se añaden límites de memoria y CPU
    build: ./app
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 128M
    # VULNERABILIDAD CORREGIDA (MEDIUM): Se añade healthcheck
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    # VULNERABILIDAD CORREGIDA (MEDIUM): Puerto bindeado a interfaz específica
    build: ./nginx
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - web

volumes:
  redis_data:
