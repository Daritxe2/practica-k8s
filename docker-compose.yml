version: '3.8'

services:
  web:
    build: ./app
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      # VULNERABILIDAD INTENCIONADA 4: Credenciales en texto plano
      - DB_NAME=practica
      - DB_USER=admin
      - DB_PASSWORD=supersecreto
    depends_on:
      - db

  db:
    image: postgres:13
    environment:
      # VULNERABILIDAD INTENCIONADA 4: Credenciales en texto plano
      - POSTGRES_DB=practica
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=supersecreto
    volumes:
      # Base de datos persistente requerida
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  db_data: